# Decap CMS writes content changes to GitHub.
backend:
  name: github
  repo: dun-yuan/CPIL-webpage
  branch: main
  squash_merges: true
  site_domain: https://cpil-webpage.pages.dev
  base_url: https://cpil-webpage.pages.dev
  auth_endpoint: /api/auth

# Keep this enabled so CMS edits are reviewed as pull requests before publication.
# Also protect the main branch in GitHub and require at least one approving PR review.
publish_mode: editorial_workflow

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: "https://cpil-webpage.pages.dev"
display_url: "https://cpil-webpage.pages.dev"
logo_url: "/images/brand/cpil-admin-logo.png"

collections:
  - name: "people"
    label: "People"
    label_singular: "Person"
    folder: "src/content/people"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    summary: "{{name}} - {{role}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - label: "Role"
        name: "role"
        widget: "select"
        options:
          - "Director"
          - "Faculty / Senior Researchers"
          - "PhD Students"
          - "Postdocs"
          - "Visiting Scholars"
          - "Interns"
          - "Alumni"
      - { label: "Affiliation", name: "affiliation", widget: "string" }
      - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Use a square or landscape image. Uploaded files are stored under public/images/uploads." }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false }
      - label: "Research Interests"
        name: "interests"
        widget: "list"
        required: false
        field: { label: "Interest", name: "interest", widget: "string" }
      - { label: "Short Bio", name: "bio", widget: "text" }
      - { label: "Sort Order", name: "order", widget: "number", value_type: "int", default: 100 }

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    summary: "{{title}} - {{status}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Description", name: "shortDescription", widget: "text" }
      - { label: "Long Description", name: "longDescription", widget: "text" }
      - label: "Members"
        name: "members"
        widget: "list"
        required: false
        field: { label: "Member", name: "member", widget: "string" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - label: "Links"
        name: "links"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        default: "active"
        options:
          - "active"
          - "completed"
      - { label: "Featured on Home", name: "featured", widget: "boolean", default: false }
      - { label: "Sort Order", name: "order", widget: "number", value_type: "int", default: 100 }

  - name: "publications"
    label: "Publications"
    label_singular: "Publication"
    folder: "src/content/publications"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    summary: "{{year}} - {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Authors"
        name: "authors"
        widget: "list"
        field: { label: "Author", name: "author", widget: "string" }
      - { label: "Venue", name: "venue", widget: "string" }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - "journal article"
          - "conference paper"
          - "workshop paper"
          - "preprint"
          - "book chapter"
          - "thesis"
          - "demo"
      - { label: "Abstract", name: "abstract", widget: "text" }
      - label: "Links and BibTeX"
        name: "links"
        widget: "object"
        fields:
          - { label: "Paper URL", name: "paper", widget: "string", required: false }
          - { label: "Code URL", name: "code", widget: "string", required: false }
          - { label: "Project URL", name: "project", widget: "string", required: false }
          - { label: "BibTeX", name: "bibtex", widget: "text", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "news"
    label: "News"
    label_singular: "News Item"
    folder: "src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    summary: "{{date}} - {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "External Link", name: "link", widget: "string", required: false }
